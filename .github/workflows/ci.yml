name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check turboquant_pro/ tests/ benchmarks/

      - name: Format check with black
        run: black --check turboquant_pro/ tests/ benchmarks/

      # Type check with ty (Astral). Advisory for now — the mature codebase has a
      # backlog of strict-union diagnostics; this surfaces them without gating CI.
      # Promote to a hard gate once the count is triaged down.
      - name: Type check with ty (advisory)
        run: |
          pip install ty
          ty check turboquant_pro/
        continue-on-error: true

      - name: Run tests
        run: pytest tests/test_core.py tests/test_cache.py tests/test_pgvector.py tests/test_nats_codec.py tests/test_behavioral_agreement.py tests/test_operator_trace.py tests/test_operator_sensitivity.py tests/test_volta_k2.py tests/test_cli.py tests/test_format.py tests/test_plugins.py tests/test_adc_index.py tests/test_auto_compress.py tests/test_model_compress_shape.py tests/test_monitor.py tests/test_certificate_schema.py tests/test_claims_glove.py tests/test_index.py tests/test_index_corruption.py -v
        # tests/test_cli.py: the `tqp` CLI. Its `trace` tests importorskip
        # torch/transformers (absent from [dev]) and skip here; the rest run
        # under numpy.
        # tests/test_format.py, test_plugins.py, test_adc_index.py,
        # test_auto_compress.py: pure-numpy soundness tests (seed/format,
        # conformance, index accumulation, real-recall targets).
        # tests/test_model_compress_shape.py: torch-gated (importorskip), skips
        # in CI where torch is absent; runs on the GPU/torch box.
        # tests/test_claims_glove.py: runs `tqp replay embedding_glove_recall
        # --small` against the real claims.yaml, gating the canonical GloVe
        # recall claim on a hermetic bundled subset (numpy + core only).
        # tests/test_index.py, test_index_corruption.py: the `tqp index`
        # lifecycle (create/add/delete/compact/migrate/certify/drift) + the
        # TQIX container's CRC corruption detection and single-byte-flip fuzzer.
        # GPU tests (test_cuda.py) are skipped in CI -- no CUDA available
