name: vllm-lane

# The pinned-vLLM conformance lane (2.0 roadmap, compatibility policy):
# "supported" means "in CI", and the V1 connector API is experimental
# upstream — so this lane pins EXACT vLLM versions and runs the protocol
# conformance smoke (tests/test_vllm_real_lane.py). Engine execution on GPU
# is the beta gate and lives elsewhere; this lane exists to catch API drift
# the moment a pin moves. Update docs/COMPATIBILITY_2.0.md in the same
# commit as any change to the pin matrix below.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"  # weekly, Monday 06:17 UTC
  push:
    paths:
      - "turboquant_pro/connectors/**"
      - "tests/test_vllm_real_lane.py"
      - ".github/workflows/vllm-lane.yml"

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Exact pins only; extend one green pin at a time. Each vLLM pin
          # carries its era-matched transformers (0.9.x registers model
          # configs that collide with newer transformers, e.g. 'aimv2').
          - vllm-version: "0.9.2"
            transformers-version: "4.52.4"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + pinned vLLM
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
          pip install "vllm==${{ matrix.vllm-version }}" \
                      "transformers==${{ matrix.transformers-version }}"
      - name: Protocol conformance against the pinned engine
        run: |
          python -m pytest tests/test_vllm_real_lane.py -v
