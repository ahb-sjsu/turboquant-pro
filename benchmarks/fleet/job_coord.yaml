apiVersion: batch/v1
kind: Job
metadata:
  name: tqp-fleet-coord
  namespace: ssu-atlas-ai
  labels: {app: tqp-fleet}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: {app: tqp-fleet}
    spec:
      restartPolicy: Never
      containers:
      - name: coord
        image: python:3.12
        command: ["/bin/bash", "-lc"]
        args:
        - |
          set -euo pipefail
          export PIP_ROOT_USER_ACTION=ignore PYTHONUNBUFFERED=1
          pip install -q --no-cache-dir numpy nats-py
          git clone -q --depth 1 https://github.com/ahb-sjsu/turboquant-pro.git /repo
          cd /repo && git log --oneline -1
          export PYTHONPATH=/repo:/work
          python /work/fleet_coord.py
        env:
        - {name: NATS_URL, value: "nats://atlas-nats:4222"}
        resources:
          requests: {cpu: "4", memory: 8Gi, ephemeral-storage: 5Gi}
          limits: {cpu: "4", memory: 8Gi, ephemeral-storage: 5Gi}
        volumeMounts:
        - {name: shared, mountPath: /shared}
        - {name: code, mountPath: /work}
      volumes:
      - name: shared
        persistentVolumeClaim: {claimName: tqp-fleet-shared}
      - name: code
        configMap: {name: tqp-fleet-code}
