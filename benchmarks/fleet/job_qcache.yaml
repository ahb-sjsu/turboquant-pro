# Compute the seeded query set once (right-sized), so exempt-class
# coordinators can load it instead of generating 4 x 5M-row blocks.
apiVersion: batch/v1
kind: Job
metadata:
  name: aqx-qcache
  namespace: ssu-atlas-ai
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: qcache
        image: python:3.12
        command: ["/bin/bash", "-lc"]
        args:
        - |
          set -euo pipefail
          export PIP_ROOT_USER_ACTION=ignore PYTHONUNBUFFERED=1
          pip install -q --no-cache-dir numpy
          export PYTHONPATH=/work
          python /work/fleet_qcache.py
        env:
        - {name: TQP_QUERY_SHARDS, value: "0,501,1002,1503"}
        - {name: TQP_QUERIES_PER_SHARD, value: "125"}
        resources:
          requests: {cpu: "4", memory: 8Gi, ephemeral-storage: 2Gi}
          limits: {cpu: "4", memory: 8Gi, ephemeral-storage: 2Gi}
        volumeMounts:
        - {name: shared, mountPath: /shared}
        - {name: code, mountPath: /work}
      volumes:
      - name: shared
        persistentVolumeClaim: {claimName: tqp-fleet-shared}
      - name: code
        configMap: {name: tqp-fleet-code}
