---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tqp-fleet-shared
  namespace: ssu-atlas-ai
  labels: {app: tqp-fleet}
spec:
  accessModes: [ReadWriteMany]
  storageClassName: rook-cephfs-east
  resources: {requests: {storage: 200Gi}}
