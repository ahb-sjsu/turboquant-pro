# Template: __I__ = server id (0..49). Scattered exact ADC full-scan
# reference over that server's 100B range (CPU-pegged batch; waves of 8,
# ~3-4 h each at 2B rows/server).
apiVersion: batch/v1
kind: Job
metadata:
  name: aqx-ref100-__I__
  namespace: ssu-atlas-ai
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: ref
        image: python:3.12
        command: ["/bin/bash", "-lc"]
        args:
        - |
          set -euo pipefail
          export PIP_ROOT_USER_ACTION=ignore PYTHONUNBUFFERED=1
          pip install -q --no-cache-dir numpy
          git clone -q --depth 1 https://github.com/ahb-sjsu/turboquant-pro.git /repo
          export PYTHONPATH=/repo:/work
          python /work/fleet_ref.py
        env:
        - {name: TQP_SERVER_ID, value: "__I__"}
        - {name: TQP_RUN_TAG, value: "100b"}
        - {name: TQP_QUERY_SHARDS, value: "0,5000,10000,15000"}
        - {name: TQP_QUERIES_PER_SHARD, value: "125"}
        resources:
          requests: {cpu: "6", memory: 8Gi, ephemeral-storage: 5Gi}
          limits: {cpu: "6", memory: 8Gi, ephemeral-storage: 5Gi}
        volumeMounts:
        - {name: idx, mountPath: /idx, readOnly: true}
        - {name: shared, mountPath: /shared}
        - {name: code, mountPath: /work}
      volumes:
      - name: idx
        persistentVolumeClaim: {claimName: tqp-fleet-100b-__I__}
      - name: shared
        persistentVolumeClaim: {claimName: tqp-fleet-shared}
      - name: code
        configMap: {name: tqp-fleet-code}
