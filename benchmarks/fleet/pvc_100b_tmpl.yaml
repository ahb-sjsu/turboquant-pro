# Template: __I__ = server id (0..49). 100B hot-tier volume: 2B rows x
# ~28 B/row (24.01 B/row v3 + uint32 IVF members) ~ 56 GB, inside the
# measured 64Gi-per-PVC Gatekeeper cap on linstor-ha. 50 volumes / 50
# logical servers, built in waves of 8 CPU-pegged jobs. 500 shards/server
# would need 70 GB and overflow the cap, hence 50 x 400 rather than 40 x 500.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tqp-fleet-100b-__I__
  namespace: ssu-atlas-ai
  labels: {app: tqp-fleet}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: linstor-ha
  resources: {requests: {storage: 64Gi}}
