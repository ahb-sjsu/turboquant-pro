# claims.yaml — the executable + referenced reproduction ledger for `tqp replay`.
#
# Each entry is one claim. Entries with a `command` are executed by the replay
# runner (writing a normalized results.json compared against `expected`); entries
# without one are `reference` claims — surfaced by `tqp replay --list`, reproduced
# by opening the linked notebook/doc (the heavy, data/GPU-bound headline results).
#
# Coherence note: acceptance metrics here are the ones the consumer actually uses
# — recall for retrieval, the rank certificate / (A2) probe elsewhere — never
# reconstruction cosine on its own (see docs/KV_KEYS_FINDING.md).
#
# WARNING: `command` / `full_command` run through the shell. claims.yaml is a
# trusted in-repo artifact; review before running `tqp replay` on an untrusted copy.

version: 1

claims:
  track1_recall_smoke:
    track: embedding
    status: reproducible
    dataset: synthetic (moderate-rank, spread directions; generated in-script)
    hardware: cpu
    command: python benchmarks/replay_smoke.py --out results.json
    full_command: python benchmarks/replay_smoke.py --full --out results.json
    outputs:
      - results.json
    expected:
      recall_at_10_min: 0.80
      ratio_min: 10
    description: >
      A fixed PCA-Matryoshka + 4-bit recipe preserves recall@10 of
      compressed-domain nearest neighbours at >10x compression — the Track-1
      mechanism, on the metric retrieval consumes, in seconds on CPU.

  embedding_glove_recall:
    track: embedding
    status: reproducible
    dataset: glove-100-angular (public; tiny real subset bundled for CI)
    hardware: cpu
    command: python benchmarks/canonical_glove.py --small --out results.json
    full_command: python benchmarks/canonical_glove.py --full --out results.json
    outputs:
      - results.json
    expected:
      recall_at_10_rerank_min: 0.95
      compression_ratio_min: 9.5
    reference: notebooks/claims/00_canonical_sota_embedding.ipynb
    description: >
      Full-dimension PCA rotation + 3-bit TurboQuant feeding compressed-domain
      ADC search preserves recall@10 of the exact ranking on real GloVe: ~9.6x
      compression at recall@10 ~= 0.999 with 12x oversample + exact rerank,
      measured on the full 1.18M corpus. Acceptance is reranked recall — the
      metric retrieval consumes — never reconstruction cosine, which reads ~0.98
      here while single-pass ADC recall (no rerank) is only ~0.74; rerank on the
      retained originals is what recovers retrieval. `tqp replay` runs the
      hermetic `--small` bundled subset in CI and gates on the floors above;
      `full_command` is the real 1.18M run (Atlas/local).

  embedding_27x_high_recall:
    track: embedding
    status: needs-local-run
    dataset: sentence/vision encoders (concentrated spectrum); see notebook
    hardware: cpu
    reference: notebooks/claims/00_canonical_sota_embedding.ipynb
    description: >
      Up to 27x compression at high recall@10 with 5x oversample + exact rerank,
      where PCA truncation pays off (high-dim, concentrated-spectrum encoders).
      The fuller method-ladder headline; reproduced by a full notebook run. For
      GloVe-100 specifically, PCA truncation loses and the honest result is the
      full-dimension recipe gated by `embedding_glove_recall` (above).

  embedding_beats_rabitq_ties_opq:
    track: embedding
    status: needs-local-run
    dataset: glove-100-angular (1.18M, public)
    hardware: cpu
    reference: benchmarks/canonical_embedding.py
    description: >
      At matched bytes/vector, the canonical harness beats RaBitQ on recall and
      ties OPQ, building 4-20x faster. See benchmarks/RESULTS_glove.md and
      RESULTS_labse_199k.md.

  kv_keys_per_channel:
    track: operator
    status: experimental
    dataset: Llama-2-7B/13B, Mistral-7B, Qwen2.5-7B/1.5B + perplexity/LongBench
    hardware: gpu
    reference: docs/model_cards/attention_keys.md
    description: >
      Attention keys (SOFTMAX_SCORE) need per-channel / asym-NF4 treatment;
      per-vector polar quantization collapses them (v1.2.0, Qwen2.5 ppl
      12.24->10643) and symmetric NF4 collapses high-GQA models (Qwen2.5-7B
      qasper 43.8->4.7). Real-model evidence + negative cases in the model card;
      raw data benchmarks/kvquant_matrix/results_matrix.json. Family choice is
      checkable at calibration time with `tqp probe --consumer attention_logits`.

  moe_routing_margin:
    track: operator
    status: experimental
    dataset: OLMoE-1B-7B-0924 (64 experts, top-8) on WikiText-2
    hardware: gpu
    reference: benchmarks/validate_olmoe_routing.py
    description: >
      MoE routing (GATE_SELECTION) fragility is carried by the routing margin,
      not the magnitude. On real OLMoE, a controlled differential-logit
      perturbation at 0.25x the median margin flips low-margin tokens ~1740x more
      than high-margin (top-8 set), ~1256x at the argmax; naive 4-bit gate-weight
      quant reshuffles 92% of top-8 sets. Model card docs/model_cards/moe_routing.md,
      raw data benchmarks/results_olmoe_routing.json. Reproduce on a GPU box:
      `python benchmarks/validate_olmoe_routing.py`.

  ssm_decay_basis:
    track: operator
    status: experimental
    dataset: Mamba-790m on WikiText-2
    hardware: gpu
    reference: benchmarks/validate_mamba_decay.py
    description: >
      SSM state decay (STATE_DECAY) must be quantized in its native A_log
      (log-time-constant) basis, not linearly. On real Mamba-790m, 3-bit linear
      quantization of the continuous decay A collapses WikiText-2 perplexity
      11.65->1.01e10, while the native A_log basis keeps it at 14.44 (~7e8x gap).
      Model card docs/model_cards/ssm_decay.md, raw data
      benchmarks/results_mamba_decay.json. Reproduce on a GPU box:
      `python benchmarks/validate_mamba_decay.py`.
